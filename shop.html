<!DOCTYPE html>
<html>
<head>
  <title>Shop - Art & Craft</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
  <h2>Art & Craft 🎨</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart 🛒</a>
    <a href="admin.html">Admin</a>
  </div>
</nav>

<h1 style="text-align:center;">Shop Our Crafts 🛍️</h1>

<!-- PRODUCTS -->
<div id="products" class="cards"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// ADD TO CART FUNCTION
function addToCart(name, price, image) {
  cart.push({name, price, image});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart 💖");
}

// 🔥 LOCAL PRODUCTS (YOUR IMAGES)
const products = [
  {
    name: "Handmade Vase",
    price: 200,
    image: "pic1.jpg"
  },
  {
    name: "Wall Hanging",
    price: 300,
    image: "pic2.jpg"
  },
  {
    name: "Craft Kit",
    price: 150,
    image: "pic3.jpg"
  },
  {
    name: "Bottle Art",
    price: 250,
    image: "pic4.jpg"
  },
  {
    name: "Decor Lamp",
    price: 400,
    image: "pic5.jpg"
  },
  {
    name: "Wooden Frame",
    price: 350,
    image: "pic6.jpg"
  }
];

// SHOW PRODUCTS
const container = document.getElementById("products");

products.forEach(p => {
  container.innerHTML += `
    <div class="card">
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick="addToCart('${p.name}', ${p.price}, '${p.image}')">
        Add to Cart 🛒
      </button>
    </div>
  `;
});
</script>

</body>
</html>
